global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'backend'
    basic_auth:
      username: '${PROMETHEUS_USER:-monitor}'
      password: '${PROMETHEUS_PASS}'
    static_configs:
      - targets: ['host.docker.internal:5003']
    metrics_path: '/metrics'
    scheme: 'http'

