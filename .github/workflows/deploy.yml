name: AWS EC2 Continuous Deployment

on:
  push:
    branches:
      - main  # Triggers the pipeline on push to the main branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      # Step 1: Checkout Repository Code
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: Set up Node.js Environment
      - name: Setup Node.js (v20)
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: |
            frontend/package-lock.json
            backend/package-lock.json

      # Step 3: Install & Compile Frontend Assets
      - name: Build Frontend
        run: |
          cd frontend
          npm install
          npm run build

      # Step 4: Install & Compile Backend Services
      # Note: We bypass running tests during production compile if they depend on local database connections.
      - name: Build Backend
        run: |
          cd backend
          npm install
          npx tsc

      # Step 5: Configure SSH Key for secure tunnel
      - name: Configure SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.EC2_IP }} >> ~/.ssh/known_hosts

      # Step 5.5: Ensure target directories exist on remote
      - name: Prepare Remote Directories
        run: |
          ssh -i ~/.ssh/id_rsa ubuntu@${{ secrets.EC2_IP }} "mkdir -p ~/script-editor/frontend/dist ~/script-editor/backend"

      # Step 6: Deploy Frontend static assets to Server (Rsync for incremental sync)
      - name: Deploy Frontend Assets
        run: |
          # Sync built dist folder directly to the Nginx root directory
          rsync -avz --delete -e "ssh -i ~/.ssh/id_rsa" frontend/dist/ ubuntu@${{ secrets.EC2_IP }}:~/script-editor/frontend/dist/

      # Step 7: Deploy Backend compiled files to Server
      - name: Deploy Backend Files
        run: |
          # Sync package files and compiled dist folder, excluding source code and dev folders
          rsync -avz --delete -e "ssh -i ~/.ssh/id_rsa" \
            --exclude='node_modules' \
            --exclude='src' \
            --exclude='.env' \
            --exclude='*.ts' \
            backend/ ubuntu@${{ secrets.EC2_IP }}:~/script-editor/backend/

      # Step 8: Remote SSH Execution (Restart PM2 and reload Nginx)
      - name: Execute Remote Deployment Commands
        run: |
          # Get current git commit count on the runner
          COMMIT_COUNT=$(git rev-list --count HEAD)
          
          # Pass COMMIT_COUNT to the remote shell using bash -s
          ssh -i ~/.ssh/id_rsa ubuntu@${{ secrets.EC2_IP }} "export COMMIT_COUNT=$COMMIT_COUNT; bash -s" << 'EOF'
            # 1. Update backend production dependencies
            cd ~/script-editor/backend
            npm install --production

            # 2. Restart the Backend PM2 process
            pm2 restart script-backend

            # 3. Reload Nginx to clear cache & apply updates
            sudo systemctl reload nginx
            
            # 4. Update the Git Deploy metrics for Prometheus/Node Exporter
            echo -e "# HELP git_commits_total Total number of Git commits.\n# TYPE git_commits_total counter\ngit_commits_total $COMMIT_COUNT" > /tmp/git.prom
            sudo mv /tmp/git.prom /var/lib/prometheus/node-exporter/git.prom
            
            echo "CI/CD Deployment successful!"
          EOF
